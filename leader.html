<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>빛나는교회 | 가정교회 데이터 입력</title>
    <!-- Google Fonts Noto Sans KR & Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Noto Sans KR', 'sans-serif'],
              outfit: ['Outfit', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Noto Sans KR', sans-serif;
        background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 50%, #a7f3d0 100%);
        min-height: 100vh;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow: 0 10px 30px -10px rgba(4, 120, 87, 0.15);
      }
    </style>
  </head>
  <body class="flex items-center justify-center p-4">

    <div class="w-full max-w-md glass-card rounded-2xl p-6 md:p-8 transition-all duration-300 transform scale-100 hover:scale-[1.01]">
      
      <!-- Logo / Header -->
      <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-emerald-100 text-emerald-700 mb-3">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-church"><path d="m18 22-.89-3.14a1.6 1.6 0 0 0-3.08 0L13.14 22"/><path d="M10 22v-4a2 2 0 1 0-4 0v4"/><path d="m2 22 .89-3.14a1.6 1.6 0 0 1 3.08 0L6.86 22"/><path d="M12 2v10"/><path d="M9 5h6"/><path d="M20 22V8a2 2 0 0 0-2-2h-3V3.5a1.5 1.5 0 0 0-3 0V6H9V3.5a1.5 1.5 0 0 0-3 0V6H3a2 2 0 0 0-2 2v14"/><rect x="9" y="10" width="6" height="4" rx="1"/></svg>
        </div>
        <h1 class="text-xl font-bold tracking-tight text-emerald-950 font-sans">빛나는교회 가정교회 보고</h1>
        <p class="text-xs text-emerald-750 mt-1">이번 주 가정교회의 출석 및 성경읽기 현황을 보고해주세요.</p>
      </div>

      <!-- Input Form -->
      <form id="leader-form" class="space-y-5">
        
        <!-- Dropdown select for family church -->
        <div>
          <label for="churchId" class="block text-xs font-semibold text-emerald-900 mb-1.5 pl-1">🏡 가정교회 선택</label>
          <select id="churchId" name="churchId" required class="w-full bg-white/70 border border-emerald-200 rounded-xl py-3 px-4 text-sm text-emerald-950 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all duration-200 cursor-pointer">
            <option value="" disabled selected hidden>가정교회를 선택하세요</option>
            <option value="김광선">소망 (김광선)</option>
            <option value="김길남">벧엘 (김길남)</option>
            <option value="김동주">부흥 (김동주)</option>
            <option value="김애신">양무리 (김애신)</option>
            <option value="조영숙">샤론 (조영숙)</option>
            <option value="윤명순">은혜 (윤명순)</option>
            <option value="이숙용">사랑 (이숙용)</option>
            <option value="임상섭">동행 (임상섭)</option>
            <option value="임춘옥">마하나임 (임춘옥)</option>
            <option value="정현숙">임마누엘 (정현숙)</option>
            <option value="김명선">한나 (김명선)</option>
            <option value="새가족">새가족</option>
          </select>
        </div>

        <!-- Input for attendance (출석) -->
        <div>
          <label for="attendance" class="block text-xs font-semibold text-emerald-900 mb-1.5 pl-1">👥 출석 기록 (출석 수 또는 약어)</label>
          <input type="text" id="attendance" name="attendance" placeholder="예: 직원회 참석 시 '직', '원', '회' 또는 인원수 입력" class="w-full bg-white/70 border border-emerald-200 rounded-xl py-3 px-4 text-sm text-emerald-950 placeholder-emerald-450 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all duration-200">
          <p class="text-[10px] text-emerald-700/80 mt-1 pl-1">※ 직원회 소집 주간에는 안내에 따라 지정 약어("직", "원", "회")를 적어주세요.</p>
        </div>

        <!-- Input for Bible reading pages (성경읽기 이번주 장수) -->
        <div>
          <label for="thisWeek" class="block text-xs font-semibold text-emerald-900 mb-1.5 pl-1">📖 이번 주 성경읽기 장수</label>
          <input type="number" id="thisWeek" name="thisWeek" required min="0" placeholder="이번 주에 읽은 총 장수를 숫자로 입력하세요" class="w-full bg-white/70 border border-emerald-200 rounded-xl py-3 px-4 text-sm text-emerald-950 placeholder-emerald-450 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all duration-200">
        </div>

        <!-- Submit Button -->
        <button type="submit" id="submit-btn" class="w-full bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 text-white font-bold py-3.5 px-4 rounded-xl shadow-md shadow-emerald-600/10 transition-all duration-150 transform active:scale-[0.98] text-sm cursor-pointer flex items-center justify-center gap-2">
          <span>보고 제출하기</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-send"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
        </button>

      </form>

      <!-- Footer Info -->
      <div class="mt-6 text-center text-[10px] text-emerald-700/60 font-mono">
        &copy; 2026 Shining Church bulletin sync engine
      </div>

    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-5 inset-x-5 md:inset-x-auto md:right-5 md:w-80 bg-stone-900 text-white text-xs px-4 py-3.5 rounded-xl shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 flex items-center gap-2 z-50">
      <span id="toast-icon">✨</span>
      <span id="toast-message">제출 완료</span>
    </div>

    <script>
      const form = document.getElementById('leader-form');
      const submitBtn = document.getElementById('submit-btn');
      const toast = document.getElementById('toast');
      const toastMessage = document.getElementById('toast-message');
      const toastIcon = document.getElementById('toast-icon');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Disable button and show loading state
        submitBtn.disabled = true;
        submitBtn.innerHTML = `
          <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          제출 중...
        `;

        const formData = new FormData(form);
        const data = {
          churchId: formData.get('churchId'),
          attendance: formData.get('attendance'),
          thisWeek: formData.get('thisWeek')
        };

        try {
          const res = await fetch('/api/leader-input', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
          });
          
          const result = await res.json();
          
          if (result.success) {
            showToast("✔️", result.message, true);
            form.reset();
          } else {
            showToast("❌", result.message || "제출에 실패했습니다. 다시 시도해주세요.", false);
          }
        } catch (error) {
          console.error(error);
          showToast("❌", "서버와 통신하는 중 요류가 발생했습니다.", false);
        } finally {
          // Restore button state
          submitBtn.disabled = false;
          submitBtn.innerHTML = `
            <span>보고 제출하기</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-send"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
          `;
        }
      });

      function showToast(icon, message, isSuccess) {
        toastIcon.innerText = icon;
        toastMessage.innerText = message;
        
        if (isSuccess) {
          toast.className = "fixed bottom-5 inset-x-5 md:inset-x-auto md:right-5 md:w-80 bg-emerald-800 text-white text-xs px-4 py-3.5 rounded-xl shadow-lg transform translate-y-0 opacity-100 transition-all duration-300 flex items-center gap-2 z-50";
        } else {
          toast.className = "fixed bottom-5 inset-x-5 md:inset-x-auto md:right-5 md:w-80 bg-rose-800 text-white text-xs px-4 py-3.5 rounded-xl shadow-lg transform translate-y-0 opacity-100 transition-all duration-300 flex items-center gap-2 z-50";
        }

        setTimeout(() => {
          toast.className = "fixed bottom-5 inset-x-5 md:inset-x-auto md:right-5 md:w-80 bg-stone-900 text-white text-xs px-4 py-3.5 rounded-xl shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 flex items-center gap-2 z-50";
        }, 4000);
      }
    </script>
  </body>
</html>
